version: "3.9"

services:
  backend:
    build: ./backend
    container_name: aletheia-backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/aletheia
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: aletheia-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: aletheia-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=false
    depends_on:
      - mongo

volumes:
  mongo_data:

